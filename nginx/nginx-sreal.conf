upstream vera_api {
    server api:4000;
}

upstream client {
    server client:3000;
}

server {
    listen 80;

    client_max_body_size 200M;
    # Rewrite the URL to add the /vera-portal prefix before proxying
    rewrite ^/+(.*)$ /vera-portal/$1 break;

    # Location for API and WebSocket routes, stripping /vera-portal prefix
    location /vera-portal/api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'api,DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Allow-Credentials' "true";
            add_header 'Access-Control-Max-Age' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # WebSocket and reverse proxy headers
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        rewrite ^/+vera-portal/(.*)$ /$1 break;

        # Forward to the vera_api upstream
        proxy_pass http://vera_api;
    }

    # Dedicated location block for WebSocket connections on /api/ws
    location /vera-portal/api/ws {
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_http_version 1.1;

        # Forward WebSocket to vera_api upstream
        rewrite ^/+vera-portal/(.*)$ /$1 break;
        proxy_pass http://vera_api;
    }

    # Location for client routes, stripping /vera-portal prefix
    location /vera-portal {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'api,DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Allow-Credentials' "true";
            add_header 'Access-Control-Max-Age' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # WebSocket and reverse proxy headers
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_http_version 1.1;

        # Forward to the client upstream
        proxy_pass http://client;
    }
    # Serve static files
    root /var/www/static;

    location /vera-portal/static {
        rewrite ^/(.*)$ /$1 break;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }


    # Custom error page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}