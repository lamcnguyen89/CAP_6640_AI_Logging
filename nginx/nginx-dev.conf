upstream vera_api {
    server api:4000;
}

upstream client {
    server client:3000;
}

server {
    listen 80;

    client_max_body_size 200M;
    location /test-api/ {
        proxy_pass http://vera_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header Cross-Origin-Opener-Policy   "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp"  always;
    add_header Cross-Origin-Resource-Policy "same-origin"   always;
    add_header Permissions-Policy "xr-spatial-tracking=(self), gamepad=(self)" always;

    # Location for API and WebSocket routes, stripping /vera-portal prefix
    location /vera-portal/api/ {
          # CORS headers for all requests
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'api,DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        add_header 'Access-Control-Allow-Credentials' "true";

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }


        rewrite ^/vera-portal/api/(.*)$ /api/$1 break;
        # WebSocket headers (only for WebSocket connections)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        
        # Proxy headers
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;

        # Forward to vera_api upstream
        proxy_pass http://vera_api;
    }

    # Location for client routes, stripping /vera-portal prefix
    location ~ ^/vera-portal(?:/(?!api|static)(.*))?$ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'api,DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Allow-Credentials' "true";
            add_header 'Access-Control-Max-Age' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # WebSocket headers (only for WebSocket connections)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        
        # Forward to the client upstream
        proxy_pass http://client;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host:$server_port;

    }

    # WebXR
    location ^~ /uploads/webxr/ {
        alias /usr/share/nginx/webxr/;
        gzip_static on;  
        types {
            application/wasm wasm;
            application/javascript js;
            application/octet-stream data;             # for your .data file
        }
    }


    # Serve static files for client
    location /vera-portal/static {
        rewrite ^/vera-portal/(.*)$ /$1 break;
        root /usr/share/nginx/;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Custom error page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
